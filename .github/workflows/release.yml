name: Build and Release Tauri App

on:
  push:
    branches:
      - "GUI"
    paths:
      - "package.json" # 限制：只有当由您主动推送了带有修改过 package.json（也就是修改了版本号等信息）才会触发构建
  workflow_dispatch: # 您也可以依然在网页上手动点击运行

# 强制所有 JavaScript Actions 使用 Node.js 24 运行时，消除 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-13"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    permissions:
      contents: write # 必须开启 write 权限才能创建 Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 使用 Bun 替代 Node.js
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      # Linux (Ubuntu) 专属系统依赖
      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: bun install

      # 执行您的同步脚本
      - name: Sync Version
        run: bun run sync-version

      # 从「UPDATELOGS.md」中提取当前版本对应的更新内容
      - name: Extract Changelog
        id: changelog
        shell: bash
        run: |
          # 读取 package.json 中的版本号
          VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $VERSION"

          # 从更新日志中提取对应版本区块
          # 匹配 ## [x.y.z] 开头的区块，提取直到下一个 ## [ 或文件末尾  
          BODY=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" UPDATELOGS.md)

          if [ -z "$BODY" ]; then
            BODY="Please download the corresponding installation package according to your system. The client can also upgrade seamlessly!"
            echo "⚠️ No version [$VERSION] record found in the update log, using default description."
          else
            echo "✅ Successfully extracted update log for version [$VERSION]."
          fi

          # 输出（多行内容需要使用 heredoc 格式）
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      # 使用官方 Tauri Action，它会自动将跨平台的 updater 产物合并成 latest.json
      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri V2 要求使用下方环境变数名（映射到您的 secret）
          TAURI_SIGNER_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNER_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: "v__VERSION__" # tauri-action 的魔法占位符：自动从编译后的 tauri.conf 读取您的包版本
          releaseName: "SillyTavern Launcher GUI v__VERSION__"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false # 默认创建正式发布，您可以选择 true 预览
          prerelease: false
          args: ${{ matrix.args }}
